<div class="popover-container">

  <div class="popover-header">
    Actions
  </div>

  <div class="popover-body">

    <button class="popover-item" (click)="edit()">
      Edit
    </button>

    <button class="popover-item" (click)="appointment()">
      {{ patient.hasActiveAppointment ? 'View Appointment' : 'Create Appointment' }}
    </button>

  </div>

</div>
