<ion-menu menuId="mainMenu" contentId="main-content" type="push" side="start">
  <ion-header>
    <ion-toolbar>
      <ion-title>{{ clinicName }}</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <ng-container *ngFor="let section of visibleSections">
      <div class="sec-title">{{ section.title }}</div>

      <ion-list lines="full">
        <ion-item
          button
          *ngFor="let item of section.items"
          (click)="navigate(item.url)"
        >
          <ion-icon
            slot="start"
            [name]="item.icon || 'chevron-forward-outline'"
          ></ion-icon>

          <ion-label>{{ item.title }}</ion-label>

          <span *ngIf="item.showDot" class="dot"></span>
        </ion-item>
      </ion-list>
    </ng-container>

    <div class="divider"></div>

    <ion-list lines="none">
      <ion-item button (click)="logout()">
        <ion-icon slot="start" name="log-out-outline"></ion-icon>
        <ion-label>Logout</ion-label>
      </ion-item>
    </ion-list>
  </ion-content>
</ion-menu>
