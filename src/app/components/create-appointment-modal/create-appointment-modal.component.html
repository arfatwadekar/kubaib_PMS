<ion-content class="cap-content">
  <div class="cap-modal">

    <!-- header -->
    <div class="cap-top">
      <div class="cap-title">
        {{ mode === 'edit' ? 'Appointment Detail' : 'Create Appointment' }}
      </div>

      <button type="button" class="cap-close" (click)="close()">
        <ion-icon name="close-outline"></ion-icon>
      </button>
    </div>

    <!-- 🔽 SCROLL AREA START -->
    <div class="cap-body">

      <!-- patient -->
      <div class="cap-patient">
        <div class="cap-patient__name">
          Patient: <b>{{ patient.name }}</b>
        </div>
        <div class="cap-patient__sub">
          {{ patient.pid }} • {{ patient.phone }}
        </div>
      </div>

      <!-- status -->
      <div class="cap-info" *ngIf="mode === 'edit'">
        <div class="cap-badge">
          <span>Status:</span>
          <b>{{ statusText }}</b>
        </div>

        <div class="cap-field">
          <label class="cap-label">Update Status</label>
          <select
            class="cap-inp"
            [ngModel]="selectedStatus"
            (ngModelChange)="onStatusChange($event)"
          >
            <option [ngValue]="1">Pending</option>
            <option [ngValue]="2">InPatient</option>
            <option [ngValue]="3">AwaitingPayment</option>
            <option [ngValue]="4">OutPatient</option>
            <option [ngValue]="5">Cancelled</option>
          </select>
        </div>
      </div>

      <!-- FORM -->
      <form [formGroup]="form" class="cap-form">

        <div class="cap-field">
          <label class="cap-label">Appointment Date *</label>
          <input type="date" class="cap-inp" formControlName="appointmentDate" />
        </div>

        <div class="cap-field">
          <label class="cap-label">Appointment Time *</label>
          <input type="time" class="cap-inp" formControlName="appointmentTime" />
        </div>

        <div class="cap-field">
          <label class="cap-label">Remark</label>
          <input type="text" class="cap-inp" formControlName="remark" />
        </div>

      </form>

    </div>
    <!-- 🔼 SCROLL AREA END -->

    <!-- footer -->
    <div class="cap-actions">
      <button class="cap-btn cap-btn--primary" (click)="submit()" [disabled]="creating">
        {{ mode === 'edit' ? 'Update Appointment' : 'Create Appointment' }}
      </button>

      <button class="cap-btn cap-btn--ghost" (click)="close()">Cancel</button>
    </div>

  </div>
</ion-content>
