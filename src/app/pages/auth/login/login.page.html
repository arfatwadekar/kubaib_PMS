<ion-content class="login-bg">
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-icon">
        <ion-icon name="medkit-outline"></ion-icon>
      </div>
      <div class="brand-title">Mariam Health Care</div>
      <div class="brand-sub">Patient Management System</div>
    </div>

    <div class="login-card">

      <!-- Role Switch -->
      <div class="role-tabs">
        <button
          type="button"
          class="role-btn"
          [class.active]="role === 'Doctor'"
          (click)="setRole('Doctor')"
        >
          Doctor
        </button>

        <button
          type="button"
          class="role-btn"
          [class.active]="role === 'Receptionist'"
          (click)="setRole('Receptionist')"
        >
          Receptionist
        </button>
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="login()" class="form">

        <label class="lbl">Username</label>
        <input
          class="inp"
          formControlName="username"
          [placeholder]="role === 'Doctor' ? 'Enter Doctor ID' : 'Enter Receptionist ID'"
          autocomplete="username"
        />

        <label class="lbl">Password</label>
        <input
          class="inp"
          type="password"
          formControlName="password"
          placeholder="Enter password"
          autocomplete="current-password"
        />

        <div class="meta-row">
          <label class="remember">
            <input type="checkbox" formControlName="remember" />
            <span>Remember me</span>
          </label>

          <button
            type="button"
            class="forgot"
            (click)="forgotPassword()"
          >
            Forgot password?
          </button>
        </div>

        <div class="err" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button
          class="sign-btn"
          type="submit"
          [disabled]="loading || form.invalid"
        >
          {{ loading ? 'Signing In...' : 'Sign In' }}
        </button>

      </form>
    </div>
  </div>
</ion-content>
