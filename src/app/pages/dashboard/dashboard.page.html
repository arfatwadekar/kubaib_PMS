<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <ion-title>Patient Dashboard</ion-title>

    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="refresh()">Refresh</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="mhc-bg">
  <div class="mhc-card">
    <!-- Header Row -->
    <div class="mhc-card__top">
      <div class="mhc-title">Today’s Appointments</div>

      <div class="mhc-actions">
        <div class="mhc-search">
          <ion-icon name="search-outline" class="mhc-search__ic"></ion-icon>
          <input
            class="mhc-search__inp"
            placeholder="Search PID / Name / Phone"
            [(ngModel)]="searchText"
            (keyup.enter)="onSearch()"
          />
        </div>

        <button class="mhc-btn mhc-btn--primary" type="button" (click)="onSearch()">
          Search
        </button>

        <button class="mhc-btn mhc-btn--ghost" type="button" (click)="clearSearch()">
          <ion-icon name="funnel-outline"></ion-icon>
          Clear
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="mhc-table">
      <div class="mhc-thead">
        <div class="mhc-th">Patient ID</div>
        <div class="mhc-th">Patient Name</div>
        <div class="mhc-th">Phone Number</div>
        <div class="mhc-th">Time</div>
        <div class="mhc-th">Status</div>
        <div class="mhc-th mhc-th--actions">Actions</div>
      </div>

      <div class="mhc-tbody" *ngIf="!loading">
        <div
          class="mhc-tr"
          *ngFor="let r of filtered"
          (click)="openPatient(r)"
        >
          <div class="mhc-td mhc-td--pid">{{ r._pid }}</div>
          <div class="mhc-td">{{ r._name }}</div>
          <div class="mhc-td">{{ r._phone }}</div>

          <div class="mhc-td mhc-time">
            <ion-icon name="time-outline" class="mhc-time__ic"></ion-icon>
            <span class="mhc-time__tx">{{ r.apptTime }}</span>
          </div>

          <div class="mhc-td">
            <span class="mhc-pill" [ngClass]="pillClass(r)">
              {{ pillLabel(r) }}
            </span>
          </div>

          <div class="mhc-td mhc-td--actions">
            <button
              class="mhc-gear"
              type="button"
              (click)="openActions($event, r)"
            >
              <ion-icon name="settings-outline"></ion-icon>
            </button>
          </div>
        </div>

        <div class="mhc-empty" *ngIf="filtered.length === 0">
          No appointments found.
        </div>
      </div>

      <div class="mhc-loading" *ngIf="loading">
        Loading...
      </div>
    </div>
  </div>

  <!-- ✅ Dropdown / Popover -->
  <ion-popover
    class="mhc-popover"
    [isOpen]="actionOpen"
    [event]="actionEvent"
    (didDismiss)="closeActions()"
  >
    <ng-template>
      <div class="mhc-pop">
        <div class="mhc-pop__head">
          <div class="mhc-pop__title">Status</div>
        </div>

        <!-- UI-only items (API integration later) -->
        <button class="mhc-pop__item" type="button" (click)="closeActions()">
          <ion-icon name="checkmark-circle-outline" class="mhc-pop__ic"></ion-icon>
          <span>Mark as Today’s Appointment</span>
        </button>

        <button class="mhc-pop__item" type="button" (click)="closeActions()">
          <ion-icon name="hourglass-outline" class="mhc-pop__ic"></ion-icon>
          <span>Mark as Pending Consultation</span>
        </button>

        <button class="mhc-pop__item" type="button" (click)="closeActions()">
          <ion-icon name="bed-outline" class="mhc-pop__ic"></ion-icon>
          <span>Mark as In Patient</span>
        </button>
      </div>
    </ng-template>
  </ion-popover>
</ion-content>
