<ion-content class="ion-padding">

<div class="billing-wrap">

  <!-- SUMMARY CARDS -->
  <div class="billing-summary">

    <div class="summary-card">
      <div class="label">Consultation Charges (This Visit)</div>
      <div class="value">₹ {{ consultationCharges }}</div>
    </div>

    <div class="summary-card">
      <div class="label">Pending Balance (Previous)</div>
      <div class="value">₹ {{ pendingBalance }}</div>
    </div>

    <div class="summary-card highlight">
      <div class="label">Total Amount</div>
      <div class="value">₹ {{ totalAmount }}</div>
    </div>

  </div>

  <!-- ADD PAYMENT -->
  <div class="add-payment-row">
    <button class="btn-primary" (click)="addPaymentSection()">
      + Add Payment
    </button>
  </div>

  <!-- PAYMENT ENTRY STACK -->
  <div *ngFor="let entry of paymentEntries" class="payment-entry">

    <div class="form-row">
      <label>Date</label>
      <input type="date" [(ngModel)]="entry.date" />
    </div>

    <div class="form-row">
      <label>Amount Paid</label>
      <input type="number" [(ngModel)]="entry.amountPaid" />
    </div>

    <div class="form-row">
      <label>Payment Mode</label>
      <select [(ngModel)]="entry.paymentMode">
        <option value="Cash">Cash</option>
        <option value="Online">Online</option>
      </select>
    </div>

  </div>

  <!-- PREVIEW -->
  <div class="preview-section">
    <div>New Pending Balance:</div>
    <div class="preview-value">₹ {{ previewPendingBalance }}</div>
  </div>

  <!-- HISTORY -->
  <div class="history-section" *ngIf="paymentHistory.length > 0">

    <div class="history-row"
         *ngFor="let h of paymentHistory">
      <div>{{ h.paymentDate | date:'dd/MM/yyyy' }}</div>
      <div>{{ h.paymentMode }}</div>
      <div>₹ {{ h.amountPaid }}</div>
    </div>

  </div>

  <!-- ACTION BUTTONS -->
  <div class="footer-actions">

    <button class="btn-success"
            (click)="finalizePayments()"
            [disabled]="paymentEntries.length === 0">
      Save Payments
    </button>

    <button class="btn-outline"
            (click)="markOutPatient()">
      Mark as Out Patient
    </button>

  </div>

</div>

</ion-content>
