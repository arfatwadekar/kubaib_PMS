<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <ion-title>Patient</ion-title>

    <ion-segment
      slot="end"
      [value]="activeTab"
      (ionChange)="onSegmentChange($event)"
      scrollable="true"
    >
      <ion-segment-button value="prelim" [disabled]="isTabDisabled('prelim')">
        <ion-label>PRELIMINARY</ion-label>
      </ion-segment-button>

      <ion-segment-button value="medical" [disabled]="isTabDisabled('medical')">
        <ion-label>MEDICAL</ion-label>
      </ion-segment-button>

      <ion-segment-button value="followup" [disabled]="isTabDisabled('followup')">
        <ion-label>FOLLOW UP</ion-label>
      </ion-segment-button>

      <ion-segment-button value="payment" [disabled]="isTabDisabled('payment')">
        <ion-label>PAYMENT</ion-label>
      </ion-segment-button>

      <ion-segment-button value="identity" [disabled]="isTabDisabled('identity')">
        <ion-label>IDENTITY</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<!-- ✅ Only ONE ion-content for whole page -->
<ion-content class="ion-padding">

  <!-- ==========================
       ✅ PRELIM TAB
  =========================== -->
  <div *ngIf="activeTab === 'prelim'">

    <div class="page-title">
      <div class="h1">Preliminary Information</div>

      <ion-button
        size="small"
        fill="clear"
        *ngIf="!isEditMode"
        (click)="autoFill()"
        [disabled]="loading"
      >
        Auto Fill
      </ion-button>
    </div>

    <form class="card" [formGroup]="form" (ngSubmit)="submit()">

      <ion-grid>
        <!-- FULL NAME + GENDER -->
        <ion-row>
          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>FULL NAME <span class="req">*</span></label>
              <input class="inp" formControlName="fullName" placeholder="Full Name" />
              <div class="err" *ngIf="form.controls.fullName.touched && form.controls.fullName.invalid">
                Required
              </div>
            </div>
          </ion-col>

          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>GENDER <span class="req">*</span></label>
              <select class="inp" formControlName="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
          </ion-col>
        </ion-row>

        <!-- DOB + PHONE -->
        <ion-row>
          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>DOB <span class="req">*</span></label>
              <input class="inp" type="date" formControlName="dateOfBirth" />
              <div class="err" *ngIf="form.controls.dateOfBirth.touched && form.controls.dateOfBirth.invalid">
                Required
              </div>
            </div>
          </ion-col>

          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>PHONE NUMBER <span class="req">*</span></label>
              <input
                class="inp"
                formControlName="phoneNumber"
                placeholder="10 digits"
                (input)="onPhoneInput()"
              />
              <div class="err" *ngIf="form.controls.phoneNumber.touched && form.controls.phoneNumber.invalid">
                Enter 10 digits
              </div>
            </div>
          </ion-col>
        </ion-row>

        <!-- ALT NUMBER + EMAIL -->
        <ion-row>
          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>ALTERNATE NUMBER</label>
              <input
                class="inp"
                formControlName="alternateNumber"
                placeholder="Optional"
                (input)="onAltPhoneInput()"
              />
            </div>
          </ion-col>

          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>EMAIL</label>
              <input class="inp" formControlName="email" placeholder="Optional" />
            </div>
          </ion-col>
        </ion-row>

        <!-- MARITAL STATUS -->
        <ion-row>
          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>MARITAL STATUS</label>
              <select class="inp" formControlName="maritalStatus">
                <option value="Single">Single</option>
                <option value="Married">Married</option>
                <option value="Divorced">Divorced</option>
                <option value="Widowed">Widowed</option>
              </select>
            </div>
          </ion-col>

          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>MARITAL STATUS SINCE</label>
              <input class="inp" type="date" formControlName="maritalStatusSince" />
            </div>
          </ion-col>
        </ion-row>

        <!-- RELIGION + DIET -->
        <ion-row>
          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>RELIGION</label>
              <input class="inp" formControlName="religion" placeholder="Optional" />
            </div>
          </ion-col>

          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>DIET</label>
              <input class="inp" formControlName="diet" placeholder="Optional" />
            </div>
          </ion-col>
        </ion-row>

        <!-- EDUCATION + OCCUPATION -->
        <ion-row>
          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>EDUCATION</label>
              <input class="inp" formControlName="education" placeholder="Optional" />
            </div>
          </ion-col>

          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>OCCUPATION</label>
              <input class="inp" formControlName="occupation" placeholder="Optional" />
            </div>
          </ion-col>
        </ion-row>

        <!-- AADHAR + PAN -->
        <ion-row>
          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>AADHAR NUMBER</label>
              <input class="inp" formControlName="aadharNumber" placeholder="12 digits" (input)="onAadharInput()" />
            </div>
          </ion-col>

          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>PAN NUMBER</label>
              <input class="inp" formControlName="panNumber" placeholder="Optional" />
            </div>
          </ion-col>
        </ion-row>

        <!-- ADDRESS -->
        <ion-row>
          <ion-col size="12">
            <div class="f">
              <label>ADDRESS</label>
              <input class="inp" formControlName="address" placeholder="Optional" />
            </div>
          </ion-col>
        </ion-row>

        <!-- CITY + STATE -->
        <ion-row>
          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>CITY</label>
              <input class="inp" formControlName="city" placeholder="Optional" />
            </div>
          </ion-col>

          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>STATE</label>
              <input class="inp" formControlName="state" placeholder="Optional" />
            </div>
          </ion-col>
        </ion-row>
      </ion-grid>

      <div class="actions">
        <button class="btn primary" type="submit" [disabled]="loading">
          {{
            loading
              ? (isEditMode ? 'Updating...' : 'Creating...')
              : (isEditMode ? 'Update Patient' : 'Create Patient')
          }}
        </button>
      </div>
    </form>
  </div>

  <!-- ==========================
       MEDICAL TAB
  =========================== -->
  <div *ngIf="activeTab === 'medical'">
    <div class="page-title">
      <div class="h1">Medical</div>
    </div>
    <div class="card">MEDICAL TAB CONTENT</div>
  </div>

  <!-- ==========================
       FOLLOWUP TAB
  =========================== -->
  <div *ngIf="activeTab === 'followup'">
    <div class="page-title">
      <div class="h1">Follow Up</div>
    </div>
    <div class="card">FOLLOW UP TAB CONTENT</div>
  </div>

  <!-- ==========================
       PAYMENT TAB
  =========================== -->
  <div *ngIf="activeTab === 'payment'">
    <div class="page-title">
      <div class="h1">Payment</div>
    </div>
    <div class="card">PAYMENT TAB CONTENT</div>
  </div>

  <!-- ==========================
       IDENTITY TAB
  =========================== -->
  <div *ngIf="activeTab === 'identity'">
    <div class="page-title">
      <div class="h1">Identity</div>
    </div>
    <div class="card">IDENTITY TAB CONTENT</div>
  </div>

</ion-content>
