<app-header title="Patient"  [showNotification]="true"
  [notificationCount]="unreadCount"
  (notificationClick)="openNotifications()"></app-header>

<ion-content class="patient-page">

<!-- ============================= -->
<!-- TAB BAR -->
<!-- ============================= -->

<div class="custom-segment-bar">

  <div class="custom-segment">

    <button
      class="segment-tab"
      [class.active]="activeTab === 'prelim'"
      [disabled]="isTabDisabled('prelim')"
      (click)="selectTab('prelim')">
      Preliminary
    </button>

    <button
      class="segment-tab"
      [class.active]="activeTab === 'medical'"
      [disabled]="isTabDisabled('medical')"
      (click)="selectTab('medical')">
      Medical
    </button>

    <button
      class="segment-tab"
      [class.active]="activeTab === 'followup'"
      [disabled]="isTabDisabled('followup')"
      (click)="selectTab('followup')">
      Follow Up
    </button>

    <button
      class="segment-tab"
      [class.active]="activeTab === 'payment'"
      [disabled]="isTabDisabled('payment')"
      (click)="selectTab('payment')">
      Payment & Clousure
    </button>

    <button
      class="segment-tab"
      [class.active]="activeTab === 'reports'"
      [disabled]="isTabDisabled('reports')"
      (click)="selectTab('reports')">
      Reports
    </button>

  </div>

</div>


<!-- ============================= -->
<!-- PAGE CONTENT -->
<!-- ============================= -->

<router-outlet></router-outlet>

</ion-content>
