<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <ion-title>Create Patient</ion-title>

    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="autofill()">Auto Fill</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form class="card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="sec-h">Preliminary Information</div>

    <div class="grid3">
      <div class="f">
        <label>FULL NAME <span class="req">*</span></label>
        <input class="inp" formControlName="fullName" placeholder="Full Name" />
        <div
          class="err"
          *ngIf="form.controls.fullName.touched && form.controls.fullName.invalid"
        >
          Required
        </div>
      </div>

      <div class="f">
        <label>GENDER <span class="req">*</span></label>
        <select class="inp" formControlName="gender">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>

      <div class="f">
        <label>DOB <span class="req">*</span></label>
        <input class="inp" type="date" formControlName="dateOfBirth" />
        <div
          class="err"
          *ngIf="form.controls.dateOfBirth.touched && form.controls.dateOfBirth.invalid"
        >
          Required
        </div>
      </div>
    </div>

    <div class="grid3">
      <div class="f">
        <label>PHONE NUMBER <span class="req">*</span></label>
        <input
          class="inp"
          formControlName="phoneNumber"
          (input)="onPhoneInput()"
          placeholder="10 digits"
        />
        <div
          class="err"
          *ngIf="form.controls.phoneNumber.touched && form.controls.phoneNumber.invalid"
        >
          Enter 10 digits
        </div>
      </div>

      <div class="f">
        <label>ALTERNATE NUMBER (auto if blank)</label>
        <input
          class="inp"
          formControlName="alternateNumber"
          (input)="onAltPhoneInput()"
          placeholder="Optional"
        />
      </div>

      <div class="f">
        <label>EMAIL</label>
        <input class="inp" formControlName="email" placeholder="Optional" />
      </div>
    </div>

    <div class="grid3">
      <div class="f">
        <label>MARITAL STATUS</label>
        <select class="inp" formControlName="maritalStatus">
          <option value="Single">Single</option>
          <option value="Married">Married</option>
          <option value="Divorced">Divorced</option>
          <option value="Widowed">Widowed</option>
        </select>
      </div>

      <div class="f">
        <label>MARITAL STATUS SINCE (auto if blank)</label>
        <input class="inp" type="date" formControlName="maritalStatusSince" />
      </div>

      <div class="f">
        <label>REFERRED BY (auto if blank)</label>
        <input
          class="inp"
          formControlName="referredBy"
          placeholder="Optional"
        />
      </div>
    </div>

    <div class="grid4">
      <div class="f">
        <label>RELIGION (auto if blank)</label>
        <input class="inp" formControlName="religion" placeholder="Optional" />
      </div>
      <div class="f">
        <label>DIET (auto if blank)</label>
        <input class="inp" formControlName="diet" placeholder="Optional" />
      </div>
      <div class="f">
        <label>EDUCATION (auto if blank)</label>
        <input class="inp" formControlName="education" placeholder="Optional" />
      </div>
      <div class="f">
        <label>OCCUPATION (auto if blank)</label>
        <input
          class="inp"
          formControlName="occupation"
          placeholder="Optional"
        />
      </div>
    </div>

    <div class="grid3">
      <div class="f">
        <label>AADHAR NUMBER (auto if blank)</label>
        <input
          class="inp"
          formControlName="aadharNumber"
          (input)="onAadharInput()"
          placeholder="Optional"
        />
      </div>
      <div class="f">
        <label>PAN NUMBER (auto if blank)</label>
        <input class="inp" formControlName="panNumber" placeholder="Optional" />
      </div>
      <div class="f">
        <label>PIN CODE</label>
        <input class="inp" formControlName="pinCode" placeholder="Optional" />
      </div>
    </div>

    <div class="grid2">
      <div class="f">
        <label>ADDRESS</label>
        <input class="inp" formControlName="address" placeholder="Optional" />
      </div>
      <div class="f">
        <label>CITY</label>
        <input class="inp" formControlName="city" placeholder="Optional" />
      </div>
    </div>

    <div class="grid2">
      <div class="f">
        <label>STATE</label>
        <input class="inp" formControlName="state" placeholder="Optional" />
      </div>
    </div>

    <div class="actions">
      <button class="btn primary" type="submit" [disabled]="loading">
        {{ loading ? 'Creating...' : 'Create Patient' }}
      </button>
    </div>

    <div class="pid-card" *ngIf="createdPid">
      <div class="pid-title">Patient Created ✅</div>
      <div class="pid-value">PID: {{ createdPid }}</div>
      <div class="pid-sub">Redirecting to Search Patient…</div>
    </div>
  </form>
</ion-content>
