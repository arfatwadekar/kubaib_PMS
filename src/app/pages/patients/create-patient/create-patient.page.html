<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <ion-title>Create Patient</ion-title>

    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="autofill()">Auto Fill</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form class="card" [formGroup]="form" (ngSubmit)="submit()">

    <div class="sec-h">Preliminary Information</div>

    <ion-grid>

      <!-- FULL NAME + GENDER -->
      <ion-row>
        <ion-col size="5.8">
          <div class="f">
            <label>FULL NAME <span class="req">*</span></label>
            <input class="inp" formControlName="fullName" placeholder="Full Name" />
            <div class="err" *ngIf="form.controls.fullName.touched && form.controls.fullName.invalid">
              Required
            </div>
          </div>
        </ion-col>

        <ion-col size="5.8">
          <div class="f">
            <label>GENDER <span class="req">*</span></label>
            <select class="inp" formControlName="gender">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </ion-col>
      </ion-row>

      <!-- DOB + PHONE -->
      <ion-row>
        <ion-col size="5.8">
          <div class="f">
            <label>DOB <span class="req">*</span></label>
            <input class="inp" type="date" formControlName="dateOfBirth" />
            <div class="err" *ngIf="form.controls.dateOfBirth.touched && form.controls.dateOfBirth.invalid">
              Required
            </div>
          </div>
        </ion-col>

        <ion-col size="5.8">
          <div class="f">
            <label>PHONE NUMBER <span class="req">*</span></label>
            <input
              class="inp"
              formControlName="phoneNumber"
              placeholder="10 digits"
              (input)="onPhoneInput()"
            />
            <div class="err" *ngIf="form.controls.phoneNumber.touched && form.controls.phoneNumber.invalid">
              Enter 10 digits
            </div>
          </div>
        </ion-col>
      </ion-row>

      <!-- ALT NUMBER + EMAIL -->
      <ion-row>
        <ion-col size="5.8">
          <div class="f">
            <label>ALTERNATE NUMBER</label>
            <input
              class="inp"
              formControlName="alternateNumber"
              placeholder="Optional"
              (input)="onAltPhoneInput()"
            />
          </div>
        </ion-col>

        <ion-col size="5.8">
          <div class="f">
            <label>EMAIL</label>
            <input class="inp" formControlName="email" placeholder="Optional" />
          </div>
        </ion-col>
      </ion-row>

      <!-- MARITAL STATUS -->
      <ion-row>
        <ion-col size="5.8">
          <div class="f">
            <label>MARITAL STATUS</label>
            <select class="inp" formControlName="maritalStatus">
              <option value="Single">Single</option>
              <option value="Married">Married</option>
              <option value="Divorced">Divorced</option>
              <option value="Widowed">Widowed</option>
            </select>
          </div>
        </ion-col>

        <ion-col size="5.8">
          <div class="f">
            <label>MARITAL STATUS SINCE</label>
            <input class="inp" type="date" formControlName="maritalStatusSince" />
          </div>
        </ion-col>
      </ion-row>

      <!-- RELIGION + DIET -->
      <ion-row>
        <ion-col size="5.8">
          <div class="f">
            <label>RELIGION</label>
            <input class="inp" formControlName="religion" />
          </div>
        </ion-col>

        <ion-col size="5.8">
          <div class="f">
            <label>DIET</label>
            <input class="inp" formControlName="diet" />
          </div>
        </ion-col>
      </ion-row>

      <!-- EDUCATION + OCCUPATION -->
      <ion-row>
        <ion-col size="5.8">
          <div class="f">
            <label>EDUCATION</label>
            <input class="inp" formControlName="education" />
          </div>
        </ion-col>

        <ion-col size="5.8">
          <div class="f">
            <label>OCCUPATION</label>
            <input class="inp" formControlName="occupation" />
          </div>
        </ion-col>
      </ion-row>

      <!-- AADHAR + PAN -->
      <ion-row>
        <ion-col size="5.8">
          <div class="f">
            <label>AADHAR NUMBER</label>
            <input class="inp" formControlName="aadharNumber" (input)="onAadharInput()" />
          </div>
        </ion-col>

        <ion-col size="5.8">
          <div class="f">
            <label>PAN NUMBER</label>
            <input class="inp" formControlName="panNumber" />
          </div>
        </ion-col>
      </ion-row>

      <!-- ADDRESS -->
      <ion-row>
        <ion-col size="12">
          <div class="f">
            <label>ADDRESS</label>
            <input class="inp" formControlName="address" />
          </div>
        </ion-col>
      </ion-row>

      <!-- CITY + STATE -->
      <ion-row>
        <ion-col size="5.8">
          <div class="f">
            <label>CITY</label>
            <input class="inp" formControlName="city" />
          </div>
        </ion-col>

        <ion-col size="5.8">
          <div class="f">
            <label>STATE</label>
            <input class="inp" formControlName="state" />
          </div>
        </ion-col>
      </ion-row>

    </ion-grid>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="btn primary" type="submit" [disabled]="loading">
        {{ loading ? 'Creating...' : 'Create Patient' }}
      </button>
    </div>



  </form>
</ion-content>
