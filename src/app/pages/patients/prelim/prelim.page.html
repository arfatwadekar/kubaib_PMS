<div class="ion-padding">

  <!-- PAGE HEADER -->
  <div class="page-title">
    <div>
      <div class="h1">Preliminary Information</div>
      <div class="sub-text">
        Enter patient’s basic demographic and personal details.
      </div>
    </div>
  </div>

  <form class="card" [formGroup]="form" (ngSubmit)="submit()">

    <!-- ================= SECTION 1 ================= -->
    <div class="section">
      <div class="section-title">Basic Details</div>

      <ion-grid>

        <ion-row>
          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>FIRST NAME <span class="req">*</span></label>
              <input class="inp" formControlName="firstName" placeholder="First Name" />
              <div class="err" *ngIf="form.controls.firstName.touched && form.controls.firstName.invalid">
                Required
              </div>
            </div>
          </ion-col>

          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>LAST NAME <span class="req">*</span></label>
              <input class="inp" formControlName="lastName" placeholder="Last Name" />
              <div class="err" *ngIf="form.controls.lastName.touched && form.controls.lastName.invalid">
                Required
              </div>
            </div>
          </ion-col>
        </ion-row>

        <ion-row>
          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>GENDER <span class="req">*</span></label>
              <select class="inp" formControlName="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
          </ion-col>

          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>DATE OF BIRTH <span class="req">*</span></label>
              <input class="inp" type="date" formControlName="dateOfBirth" />
            </div>
          </ion-col>
        </ion-row>

        <ion-row>
          <ion-col size="12">
            <div class="f">
              <label>AGE</label>
              <input class="inp" formControlName="age" readonly />
            </div>
          </ion-col>
        </ion-row>

      </ion-grid>
    </div>

    <!-- ================= SECTION 2 ================= -->
    <div class="section">
      <div class="section-title">Contact Information</div>

      <ion-grid>

        <ion-row>
          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>PHONE NUMBER <span class="req">*</span></label>
              <input class="inp" formControlName="phoneNumber" placeholder="10 digits" />
            </div>
          </ion-col>

          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>ALTERNATE NUMBER</label>
              <input class="inp" formControlName="alternateNumber" />
            </div>
          </ion-col>
        </ion-row>

        <ion-row>
          <ion-col size="12">
            <div class="f">
              <label>EMAIL</label>
              <input class="inp" formControlName="email" />
            </div>
          </ion-col>
        </ion-row>

      </ion-grid>
    </div>

    <!-- ================= SECTION 3 ================= -->
    <div class="section">
      <div class="section-title">Personal Details</div>

      <ion-grid>

        <ion-row>
          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>MARITAL STATUS</label>
              <select class="inp" formControlName="maritalStatus">
                <option value="Single">Single</option>
                <option value="Married">Married</option>
                <option value="Divorced">Divorced</option>
                <option value="Widowed">Widowed</option>
              </select>
            </div>
          </ion-col>

          <ion-col size="12" sizeMd="6">
            <div class="f">
              <label>MARITAL STATUS SINCE</label>
              <input class="inp" type="date" formControlName="maritalStatusSince" />
            </div>
          </ion-col>
        </ion-row>

      </ion-grid>
    </div>

    <!-- Submit -->
    <div class="actions">
      <button class="btn primary" type="submit" [disabled]="loading">
        {{ isEditMode ? 'Update Patient' : 'Create Patient' }}
      </button>
    </div>

  </form>
</div>
