<app-header title="All Patients"></app-header>

<ion-content class="app-bg">
  <div class="app-container">
    <!-- ================= HEADER ================= -->
    <div class="card-header">
      <div class="header-left">
        <h2>Patient Directory</h2>
        <p class="sub-text">Search and manage patient records</p>
      </div>

      <div class="header-right">
        <div class="search-wrapper">
          <ion-icon name="search-outline"></ion-icon>

          <input
            type="text"
            placeholder="Search PID / Name / Phone"
            [(ngModel)]="searchText"
            (input)="onSearchInput()"
            (keyup.enter)="search()"
          />

          <ion-icon
            *ngIf="searchText"
            name="close-circle"
            class="clear-ic"
            (click)="clearSearch()"
          ></ion-icon>
        </div>

        <button
          *ngIf="!showCreatePatientBtn"
          class="btn-primary"
          (click)="search()"
          [disabled]="loading"
        >
          Search
        </button>

        <button
          *ngIf="showCreatePatientBtn"
          class="btn-success"
          (click)="goToCreatePatient()"
        >
          Create
        </button>
      </div>
    </div>

    <!-- ================= TABLE VIEW ================= -->
    <div class="table-wrapper">
      <div class="table-head">
        <div>#</div>
        <div>PID</div>
        <div>Name</div>
        <div>Phone</div>
        <div>Gender</div>
        <div></div>
      </div>

      <div class="table-row" *ngFor="let r of rows">
        <div>{{ r.srNo }}</div>

        <div>
          <span class="pid-chip">{{ r.pid }}</span>
        </div>

        <div class="name">{{ r.name }}</div>

        <div>{{ r.phone }}</div>

        <div>
          <span
            class="gender-pill"
            [ngClass]="{
              male: r.gender === 'Male',
              female: r.gender === 'Female'
            }"
          >
            {{ r.gender }}
          </span>
        </div>

        <div class="action">
          <button (click)="openActions($event, r)">
            <ion-icon name="ellipsis-vertical"></ion-icon>
          </button>
        </div>
      </div>
    </div>

    <!-- ================= MOBILE CARD VIEW ================= -->
    <div class="mobile-list">
      <div class="patient-card" *ngFor="let r of rows">
        <div class="card-top">
          <div class="left">
            <span class="pid-chip">{{ r.pid }}</span>
            <span class="sr">#{{ r.srNo }}</span>
          </div>

          <button (click)="openActions($event, r)">
            <ion-icon name="ellipsis-vertical"></ion-icon>
          </button>
        </div>

        <div class="card-name">{{ r.name }}</div>

        <div class="card-meta">
          <div>
            <div class="meta-label">Phone</div>
            <div class="meta-value">{{ r.phone }}</div>
          </div>

          <div>
            <div class="meta-label">Gender</div>
            <span
              class="gender-pill"
              [ngClass]="{
                male: r.gender === 'Male',
                female: r.gender === 'Female'
              }"
            >
              {{ r.gender }}
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- ================= PAGINATION (Desktop/Tablet Only) ================= -->
    <div class="pagination" *ngIf="!isSearching && totalPages > 0">
      <button
        class="page-btn"
        (click)="prevPage()"
        [disabled]="page === 1 || loading"
      >
        ← Prev
      </button>

      <div class="page-info">Page {{ page }} of {{ totalPages }}</div>

      <button
        class="page-btn"
        (click)="nextPage()"
        [disabled]="page === totalPages || loading"
      >
        Next →
      </button>
    </div>
  </div>
</ion-content>
