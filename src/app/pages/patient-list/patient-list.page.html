<app-header title="Patient List"></app-header>

<ion-content class="app-bg">

  <div class="app-card">

    <!-- HEADER -->
    <div class="card-header">
      <div class="header-left">
        <h2>All Patients</h2>
        <p class="sub-text">Manage and track patient records</p>
      </div>

      <div class="header-right">

        <div class="search-box">
          <ion-icon name="search-outline"></ion-icon>
          <input
            type="text"
            placeholder="Search PID / Name / Phone"
            [(ngModel)]="searchText"
            (keyup.enter)="search()"
          />
        </div>

        <button class="btn btn-search" (click)="search()">Search</button>
        <button class="btn btn-outline" (click)="clearSearch()">Clear</button>

      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">

      <div class="table-head">
        <div>Sr</div>
        <div>PID</div>
        <div>Name</div>
        <div>Phone</div>
        <div>Gender</div>
        <div>Status</div>
        <div>Actions</div>
      </div>

      <div *ngIf="loading" class="table-state">
        Loading patients...
      </div>

      <div *ngIf="!loading && rows.length === 0" class="table-state">
        No patients found
      </div>

      <div class="table-row" *ngFor="let r of rows; let i = index">

        <div>{{ i + 1 }}</div>

        <div>
          <span class="pid-chip">{{ r.pid }}</span>
        </div>

        <div class="name-cell">{{ r.name }}</div>

        <div>{{ r.phone }}</div>

        <div>
          <span class="gender-chip"
                [ngClass]="{
                  male: r.gender === 'Male',
                  female: r.gender === 'Female'
                }">
            {{ r.gender }}
          </span>
        </div>

        <div>
          <span class="status-chip"
                [ngClass]="{
                  active: r.status === 'Active',
                  inactive: r.status === 'Deactive'
                }">
            {{ r.status }}
          </span>
        </div>

        <div class="actions">
          <button class="btn btn-edit"
                  (click)="editPatient(r)">
            Edit
          </button>

          <button class="btn"
                  [ngClass]="r.hasActiveAppointment ? 'btn-view' : 'btn-create'"
                  (click)="openApptModal(r)">
            {{ r.hasActiveAppointment ? 'View' : 'Create' }}
          </button>
        </div>

      </div>

    </div>

    <!-- PAGINATION -->
    <div class="pagination">
      <button class="btn btn-outline"
              (click)="prevPage()"
              [disabled]="page === 1">
        ← Prev
      </button>

      <div class="page-info">
        Page {{ page }} of {{ totalPages }}
      </div>

      <button class="btn btn-outline"
              (click)="nextPage()"
              [disabled]="page === totalPages">
        Next →
      </button>
    </div>

  </div>

</ion-content>
