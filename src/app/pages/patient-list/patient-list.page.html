<app-header title="Patient List"></app-header>

<ion-content class="app-bg">

  <div class="app-card">

    <!-- HEADER -->
    <div class="card-header">

      <div class="header-left">
        <h2>All Patients</h2>
        <p class="sub-text">Manage and track patient records</p>
      </div>

      <div class="header-right">

        <div class="search-box">
          <ion-icon name="search-outline"></ion-icon>
          <input
            type="text"
            placeholder="Search PID / Name / Phone"
            [(ngModel)]="searchText"
            (input)="onSearchInput()"
            (keyup.enter)="search()"
          />
        </div>

        <!-- SEARCH BUTTON -->
        <button
          *ngIf="!showCreatePatientBtn"
          class="btn btn-search"
          (click)="search()"
          [disabled]="loading">
          Search
        </button>

        <!-- CREATE BUTTON -->
        <button
          *ngIf="showCreatePatientBtn"
          class="btn btn-create"
          (click)="goToCreatePatient()">
          + Create Patient
        </button>

        <button
          class="btn btn-outline"
          (click)="clearSearch()"
          [disabled]="loading">
          Clear
        </button>

      </div>

    </div>

    <!-- TABLE -->
    <div class="table-wrapper">

      <div class="table-head">
        <div>Sr</div>
        <div>PID</div>
        <div>Name</div>
        <div>Phone</div>
        <div>Gender</div>
        <div>Actions</div>
      </div>

      <div *ngIf="loading" class="table-state">
        Loading patients...
      </div>

      
      <div *ngIf="!loading && rows.length === 0 && !showCreatePatientBtn"
           class="table-state">
        No patients found
      </div>

      <div class="table-row" *ngFor="let r of rows">
        <div>{{ r.srNo }}</div>
        <div><span class="pid-chip">{{ r.pid }}</span></div>
        <div>{{ r.name }}</div>
        <div>{{ r.phone }}</div>
        <div>{{ r.gender }}</div>
        <div>
          <button (click)="openActions($event, r)">
            <ion-icon name="settings-outline"></ion-icon>
          </button>
        </div>
      </div>


      
    </div>

    <!-- PAGINATION -->
    <div class="pagination" *ngIf="!isSearching && totalPages > 0">

      <button
        class="btn btn-outline"
        (click)="prevPage()"
        [disabled]="page === 1 || loading">
        ← Prev
      </button>

      <div class="page-info">
        Page {{ page }} of {{ totalPages }}
      </div>

      <button
        class="btn btn-outline"
        (click)="nextPage()"
        [disabled]="page === totalPages || loading">
        Next →
      </button>

    </div>

  </div>

</ion-content>
