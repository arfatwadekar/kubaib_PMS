<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <ion-title>Patient Listing</ion-title>

    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="refresh()">Refresh</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="mhc-bg">
  <div class="card">
    <div class="card__head">
      <div class="card__title">All Patients</div>

      <div class="topbar">
        <div class="search">
          <ion-icon name="search-outline"></ion-icon>
          <input
            placeholder="Search PID / Name / Phone"
            [(ngModel)]="searchText"
            (input)="onSearchInput()"
            (keyup.enter)="search()"
          />
        </div>

        <button
          class="btn btn--primary"
          *ngIf="!showCreatePatientBtn"
          (click)="search()"
          [disabled]="loading"
        >
          Search
        </button>

        <button
          class="btn btn--primary"
          *ngIf="showCreatePatientBtn"
          (click)="goToCreatePatient()"
        >
          + Create Patient
        </button>

        <button
          class="btn btn--ghost"
          (click)="clearSearch()"
          [disabled]="loading"
        >
          Clear
        </button>
      </div>
    </div>

    <app-table
      [columns]="columns"
      [rows]="rows"
      [loading]="loading"
      emptyText="No patients found."
      [page]="page"
      [disablePrev]="page === 1 || loading || isSearching"
      [disableNext]="loading || isSearching || !hasNext"
      (prev)="prevPage()"
      (next)="nextPage()"
      [rowTemplate]="actionTpl"
    ></app-table>

    <ng-template #actionTpl let-r>
      <div class="action-buttons">
        <button
          class="pill-btn pill-btn--edit"
          (click)="editPatient(r, $event)"
        >
          Edit
        </button>

        <button
          class="pill-btn"
          (click)="openApptModal(r, $event)"
        >
          {{ r.hasActiveAppointment ? 'View Appointment' : 'Create Appointment' }}
        </button>
      </div>
    </ng-template>
  </div>
</ion-content>
