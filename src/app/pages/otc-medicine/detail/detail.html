<app-header [title]="
    mode === 'create'
      ? 'Create OTC Medicine'
      : mode === 'edit'
      ? 'Edit OTC Medicine'
      : 'View OTC Medicine'
  " [showNotification]="true" [notificationCount]="unreadCount" (notificationClick)="openNotifications()">
</app-header>

<ion-content fullscreen="true" style="--background: linear-gradient(180deg, #f8fafc, #eef2f7)">
  <div class="detail-bg">
    <div class="medicine-wrapper">
      <div class="medicine-card">
        <!-- Back -->
        <div class="card-top">
          <a class="back-link" (click)="cancel()" style="cursor: pointer">
            ← Back to Listing
          </a>
        </div>

        <!-- Loading -->
        <div *ngIf="loading" class="loading-state">
          <ion-spinner name="crescent"></ion-spinner>
        </div>

        <!-- FORM -->
        <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="save()">
          <div class="section-title">OTC Medicine Details</div>



          <!-- Amount Row -->
          <div class="form-row"> <!-- Medicine Name -->
            <div class="form-group">
              <label>Name Of Medicine</label>
              <input type="text" formControlName="nameOfMedicine" maxlength="100" [readonly]="mode === 'view'"
                placeholder="Enter medicine name" />
            </div>

            <div class="form-group">
              <label>Amount Of Medicine (₹) *</label>
              <input type="number" formControlName="amountOfMedicine" [readonly]="mode === 'view'" min="0"
                placeholder="Enter total amount" />
            </div>
          </div>


          <div class="form-row">
            <!-- Patient -->
            <div class="form-group">
              <label>Patient Name</label>
              <input type="text" formControlName="patientName" [readonly]="mode === 'view'"
                placeholder="Enter patient name" />
            </div>

            <div class="form-group">
              <label>Amount Paid (₹) *</label>
              <input type="number" formControlName="amountPaid" [readonly]="mode === 'view'" min="0"
                placeholder="Enter paid amount" [class.input-error]="
                  form.get('amountPaid')?.value >
                  form.get('amountOfMedicine')?.value &&
                  form.get('amountOfMedicine')?.value
                " />

              <small class="error-message" *ngIf="
                  form.get('amountPaid')?.value >
                  form.get('amountOfMedicine')?.value &&
                  form.get('amountOfMedicine')?.value
                ">
                Amount Paid cannot exceed Amount of Medicine
              </small>
            </div>
          </div>





          <!-- Balance + Date -->
          <div class="form-row">
            <div class="form-group">
              <label>Pending Balance</label>
              <input type="number" formControlName="pendingBalance" readonly placeholder="Auto calculated" />
            </div>

            <div class="form-group">
              <label>Date Of Purchase</label>
              <input type="date" formControlName="dateOfPurchase" [readonly]="mode === 'view'"
                placeholder="Select date" />
            </div>
          </div>



          <!-- Notes -->
          <!-- <div class="form-group">
            <label>Payment Notes</label>
            <textarea
              rows="3"
              formControlName="notes"
              [readonly]="mode === 'view'"
              placeholder="Add payment notes (optional)"
            ></textarea>
          </div> -->

          <!-- ACTIONS: CREATE / EDIT -->
          <div *ngIf="mode !== 'view'" class="form-actions">
            <button type="button" class="btn-cancel" (click)="cancel()">
              Cancel
            </button>

            <button type="submit" class="btn-save" [disabled]="form.invalid">
              {{ mode === 'edit' ? 'Update' : 'Create OTC Medicine' }}
            </button>
          </div>

          <!-- ACTIONS: VIEW -->
          <div *ngIf="mode === 'view'" class="form-actions">
            <button type="button" class="btn-cancel" (click)="cancel()">
              Back
            </button>

            <button type="button" class="btn-edit" (click)="editCurrentRecord()">
              Edit
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</ion-content>
