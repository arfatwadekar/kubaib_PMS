<app-header
  title="Notifications"
  [showNotification]="true"
  [notificationCount]="unreadCount"
  (notificationClick)="openNotifications()"
></app-header>

<ion-content class="notification-page">
  <div class="container">
    <!-- ================= LOADING ================= -->
    <div *ngIf="loading" class="loading-state">
      <ion-spinner name="crescent"></ion-spinner>
    </div>

    <!-- ================= EMPTY ================= -->
    <div *ngIf="!loading && notifications.length === 0" class="empty-state">
      <ion-icon name="notifications-off-outline"></ion-icon>
      <h2>No Notifications</h2>
      <p>You're all caught up!</p>
    </div>

    <!-- ================= LIST ================= -->
    <div *ngIf="!loading && notifications.length > 0" class="notification-list">
      <div
      *ngFor="let n of notifications"
  class="notification-card"
  [class.unread]="!n.isRead"
  [class.read]="n.isRead"
  [class.deleting]="n.isDeleting"
      >
        <!-- ICON -->
        <div class="icon-box">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>

        <!-- CONTENT -->
        <div class="content">
          <!-- TOP ROW -->
          <div class="top-row">
            <!-- USER INFO -->
            <div class="user-info">
              <h3 class="name">{{ n.name }}</h3>

              <!-- EMAIL | PHONE -->
              <p *ngIf="n.email || n.phone || n.phoneNumber" class="sub-info">
                <span *ngIf="n.email">{{ n.email }}</span>

                <span *ngIf="n.email && (n.phone || n.phoneNumber)">
                  &nbsp;|&nbsp;
                </span>

                <span *ngIf="n.phone || n.phoneNumber">
                  {{ n.phone || n.phoneNumber }}
                </span>
              </p>
            </div>

            <!-- META -->
            <div class="right-meta">
              <!-- DATE -->
              <span class="date">
                {{ n.createdOn | date: "dd MMM yyyy, hh:mm a" }}
              </span>

              <!-- ACTIONS -->
              <div class="action-buttons">
                <!-- MARK READ -->
                <button
                  *ngIf="!n.isRead"
                  class="mark-btn"
                  (click)="markAsRead(n, $event)"
                  [disabled]="n.isDeleting"
                >
                  Mark Read
                </button>

                <!-- READ BADGE -->
                <span
                  *ngIf="n.isRead"
                  class="read-badge"
                  (click)="$event.stopPropagation()"
                >
                  Read
                </span>

                <!-- DELETE -->
                <button
                  class="delete-btn"
                  (click)="deleteNotification(n, $event)"
                  [disabled]="n.isDeleting"
                >
                  <span *ngIf="!n.isDeleting">Delete</span>
                  <span *ngIf="n.isDeleting">Deleting...</span>
                </button>
              </div>
            </div>
          </div>

          <!-- MESSAGE -->
          <p class="message">
            {{ n.message }}
          </p>
        </div>
      </div>
    </div>

    <!-- ================= PAGINATION ================= -->
    <div class="pagination" *ngIf="!loading && totalPages > 1">
      <button
        class="page-btn"
        (click)="prevPage()"
        [disabled]="page === 1 || loading"
      >
        ← Prev
      </button>

      <div class="page-info">Page {{ page }} of {{ totalPages }}</div>

      <button
        class="page-btn"
        (click)="nextPage()"
        [disabled]="page === totalPages || loading"
      >
        Next →
      </button>
    </div>
  </div>
</ion-content>
