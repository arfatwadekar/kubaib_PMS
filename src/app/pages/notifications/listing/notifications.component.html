<app-header title="Notifications"></app-header>

<ion-content class="notification-content" fullscreen>

  <div class="page-container">
    <!-- Loading -->
    <div *ngIf="loading" class="loading">
      <ion-spinner name="crescent"></ion-spinner>
    </div>

    <!-- Notification List -->
    <div
      *ngIf="!loading && notifications.length > 0"
      class="notification-list"
    >
      <div
        *ngFor="let n of notifications"
        class="notification-card"
        [class.unread]="!n.isRead"
        (click)="openDetail(n)"
      >

        <div class="left">
          <div class="icon-circle">
            <ion-icon name="mail-outline"></ion-icon>
          </div>
        </div>

        <div class="center">
          <div class="top">
            <div>
              <h3>{{ n.name }}</h3>
              <p class="email">{{ n.email }}</p>
            </div>

            <div class="meta">
              <span class="date">
                {{ n.createdOn | date: 'short' }}
              </span>
            </div>
          </div>

          <p class="message">
            {{ n.message }}
          </p>
        </div>

        <div class="right">
          <ion-icon
            *ngIf="n.isRead"
            name="checkmark-done-outline"
            class="read-icon"
          ></ion-icon>

          <ion-button
            *ngIf="!n.isRead"
            size="small"
            fill="solid"
            (click)="markAsRead(n, $event)"
          >
            <ion-icon name="checkmark-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </div>

      </div>
    </div>

    <!-- Empty -->
    <div *ngIf="!loading && notifications.length === 0" class="empty">
      <ion-icon name="notifications-off-outline"></ion-icon>
      <p>No Notifications Yet</p>
    </div>

  </div>
</ion-content>
