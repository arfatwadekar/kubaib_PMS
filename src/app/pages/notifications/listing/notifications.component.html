<app-header title="Notifications"></app-header>

<ion-content class="notification-page">

  <div class="container">

    <div *ngIf="loading" class="loading-state">
      <ion-spinner name="crescent"></ion-spinner>
    </div>

    <div *ngIf="!loading && notifications.length > 0"
         class="notification-list">

      <div *ngFor="let n of notifications"
           class="notification-card"
           [class.unread]="!n.isRead"
           [class.read]="n.isRead"
         >

        <!-- LEFT ICON -->
        <div class="icon-box">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>

        <!-- CONTENT -->
        <div class="content">

          <div class="top-row">

            <div class="user-info">
              <h3 class="name">{{ n.name }}</h3>

              <p class="sub-info" *ngIf="n.email">
                {{ n.email }}
              </p>

              <p class="sub-info" *ngIf="n.phone || n.phoneNumber">
                {{ n.phone || n.phoneNumber }}
              </p>
            </div>

            <div class="right-meta">
              <span class="date">
                {{ n.createdOn | date:'dd MMM yyyy, hh:mm a' }}
              </span>

              <span *ngIf="n.isRead" class="read-badge">
                Read
              </span>

              <button *ngIf="!n.isRead"
                      class="mark-btn"
                      (click)="markAsRead(n, $event)">
                Mark Read
              </button>
            </div>

          </div>

          <p class="message">
            {{ n.message }}
          </p>

        </div>

      </div>

    </div>

  </div>

</ion-content>
